# rules below would make the specific app center for steam
windowrule {
  name = windowrule-19
  workspace = 2 silent
  match:class = ^([Ss]team)$
  match:title = ^([Ss]team)$
}

#windowrulev2 = float, class:^([Ss]team)$, title:^((?![Ss]team).*)$
#windowrulev2 = tile, class:^([Ss]team)$, title:^([Ss]team)$
windowrule {
  name = windowrule-20
  center = on
  monitor = DP-1
  match:class = ^(steam)$
  match:title = ^(Sign in to Steam)$
}

windowrule {
  name = windowrule-21
  center = on
  monitor = DP-1
  match:class = ^(com.valvesoftware.Steam)$
  match:title = ^(Sign in to Steam)$
}

windowrule {
  name = windowrule-22
  stay_focused = on
  min_size = 1 1
  match:title = ^()$
  match:class = ^(steam)$
}

windowrule {
  name = windowrule-23
  stay_focused = on
