#windowrulev2 = fullscreen,class:^steam_app\d+$
windowrule {
  name = windowrule-37
  monitor = 0
  workspace = 10
  match:class = ^steam_app_\d+$
}

workspace = 10, border:false, rounding:false

# Example XWayland https://wiki.hyprland.org/Useful-Utilities/Screen-Sharing/
windowrule {
  name = windowrule-38
  opacity = 0.0 override 0.0 override
  no_anim = on
  no_focus = on
  no_initial_focus = on
  match:class = ^(xwaylandvideobridge)$
}

# Update yay move down and size for Theme V1
windowrule {
  name = windowrule-1
  float = on
  match:title = ^(update1-sys)$
}

windowrule {
  name = windowrule-2
  move = (500) (64)
  match:class = ^(kitty)$
  match:title = ^(update1-sys)$ # moves kitty to 100 100
}

windowrule {
  name = windowrule-3
  size = 1000 1000
  match:class = ^(kitty)$
  match:title = ^(update1-sys)$ # limit size kitty to 1000 1000
}

layerrule {
  name = layerrule-1
  ignore_alpha = 0
  match:namespace = <rofi>
}

