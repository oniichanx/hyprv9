##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
#windowrule = float, ^(kitty)$
#windowrule = float,^(pavucontrol)$
windowrule {
  name = windowrule-1
  float = on
  match:class = ^(org.pulseaudio.pavucontrol)$
}

windowrule {
  name = windowrule-2
  float = on
  match:class = ^(blueman-manager)$
}

windowrule {
  name = windowrule-3
  float = on
  match:class = ^(nm-connection-editor)$
}

windowrule {
  name = windowrule-4
  float = on
  animation = popin
  match:class = ^(chromium)$
}

windowrule {
  name = windowrule-5
  float = on
  animation = popin
  opacity = 0.8 0.8
  match:class = ^(thunar)$
}

windowrule {
  name = windowrule-6
  float = on
  match:title = ^(btop)$
}

windowrule {
  name = windowrule-7
  float = on
  match:title = ^(update-sys)$
}


# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# rules below would make the specific app transparent
windowrule {
  name = windowrule-8
  opacity = 0.8 0.8
  match:class = ^(kitty)$
}

windowrule {
  name = windowrule-9
  animation = popin
  match:class = ^(kitty)$
  match:title = ^(update-sys)$
}

windowrule {
  name = windowrule-10
  opacity = 0.8 0.8
  match:class = ^(VSCodium)$
}

windowrule {
  name = windowrule-11
  move = (cursor_x+(-(monitor_w*0.03))) (cursor_y+(-(monitor_h*1.05)))
  no_anim = on
  opacity = 0.8 0.6
  match:class = ^(wofi)$
}

windowrule {
  name = windowrule-12
  opacity = 0.8 0.6
  match:class = ^(wofi)$
  match:title = ^(--show dmenu)$
}

windowrule {
  name = windowrule-13
  immediate = on
  match:class = ^(cs2)$
}

windowrule {
  name = windowrule-14
  immediate = on
  match:class = ^(osu!)$
}

windowrule {
  name = windowrule-15
  float = on
  size = 800 450
  center = on
  match:title = ^(Picture-in-Picture|Firefox)$
}

#windowrulev2 = pin, title:^(Picture-in-Picture|Firefox)$
windowrule {
  name = windowrule-16
  workspace = 3 silent
  match:class = ^(discord)$
}

windowrule {
  name = windowrule-17
  workspace = 3 silent
  match:class = ^(WebCord)$
}

windowrule {
  name = windowrule-18
  immediate = on
  match:class = ^(osu!.exe)$
}


