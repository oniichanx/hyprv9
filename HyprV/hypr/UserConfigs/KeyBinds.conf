####################
### KEYBINDINGSS ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, kitty  #open the terminal
bind = $mainMod, F4, killactive, # close the active window
bind = $mainMod, L, exec, hyprlock # Lock the screen
bind = $mainMod, M, exec, wlogout --protocol layer-shell # show the logout window
bind = $mainMod SHIFT, M, exit, # Exit Hyprland all together no (force quit Hyprland)
bind = $mainMod, E, exec, thunar # Show the graphical file browser
bindd = $mainMod, V, Float current window, togglefloating, # Allow a window to float
bindd = $mainMod ALT, V, Float all windows, exec, $scriptsDir/Float-all-Windows.sh
bind = $mainMod, SPACE, exec, rofi -show drun -modi drun, filebrowser,run,window # Show the graphical app launcher
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, cyclenext,prev, # dwindle
bind = $mainMod, S, exec, grim -g "$(slurp)" - | swappy -f - # take a screenshot
bind = ALT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy # open clipboard manager
#bind = $mainMod, T, exec, ~/.config/HyprV/hyprv_util vswitch # switch HyprV version
bind = $mainMod, T, exec, ~/.config/hypr/scripts/WaybarLayout.sh
bind = $mainMod, Y, exec, ~/.config/hypr/scripts/WaybarStyles.sh
bind = $mainMod, U, exec, ~/.config/HyprV/hypr/UserScripts/WallpaperSelect.sh
#bind = $mainMod, I, exec, ~/.config/HyprV/hypr/scripts/Light_Dark.sh
bind = $mainMod, F, fullscreen
bind = $mainMod, I, exec, ~/.config/HyprV/hypr/UserScripts/WallpaperEffects.sh
bind = $mainMod ALT, G, exec, ~/.config/HyprV/hypr/scripts/GameMode.sh
bind = $mainMod ALT, H, exec, ~/.config/HyprV/hypr/UserScripts/Animations.sh
bind = $mainMod ALT, E, exec, ~/.config/HyprV/hypr/UserScripts/QuickEdit.sh
bind = $mainMod ALT, B, exec, ~/.config/HyprV/hypr/scripts/ChangeBlur.sh
bind = $mainMod ALT, R, exec, ~/.config/HyprV/hypr/scripts/RofiThemeSelector.sh
bindln = ALT_L, SHIFT_L, exec, ~/.config/HyprV/hypr/scripts/KeyboardLayout.sh switch # Change keyboard layout

# Night light toggle (Hyprsunset)
bindd = $mainMod, N, toggle night light, exec, $scriptsDir/Hyprsunset.sh toggle

bind = $mainMod SHIFT, X, exec, notify-send -u critical -t 3000 "Kill" "Click any window kill it" & hyprctl kill
bind = $mainMod ALT, F, fullscreen

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

